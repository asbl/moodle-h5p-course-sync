<section class="python-question-card" id="question-${IDENTIFIER}" data-question-id="${IDENTIFIER}">
    <button class="question-toolbar question-row-button" type="button" aria-label="${TITLE} öffnen" data-open-modal="true" data-frame-src="${FRAME_SRC}" data-frame-title="${TITLE}" data-status-url="${STATUS_SRC}">
        <span class="question-toolbar-title">${TITLE}</span>
    </button>
    <button class="question-rebuild-button" type="button" aria-label="${TITLE} neu bauen" title="H5P neu bauen" data-rebuild-url="${REBUILD_SRC}" data-frame-src="${FRAME_SRC}" data-status-url="${STATUS_SRC}">
        Neu bauen
    </button>
</section>
