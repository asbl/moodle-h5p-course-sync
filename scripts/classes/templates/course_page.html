<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>${TITLE} Vorschau</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe8;
        --surface: rgba(255, 250, 244, 0.9);
        --surface-strong: #fffdf9;
        --ink: #1c140d;
        --muted: #725b47;
        --accent: #b6532f;
        --accent-soft: #f1d7c5;
        --border: rgba(92, 58, 32, 0.18);
        --shadow: 0 20px 45px rgba(73, 43, 22, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(182, 83, 47, 0.12), transparent 26%),
          linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
      }
      main {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 96px;
      }
      h1, h2, h3 {
        line-height: 1.1;
        letter-spacing: -0.03em;
      }
      p, li {
        font-size: 1.05rem;
        line-height: 1.65;
      }
      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 16px;
        background: #22180f;
        color: #f7f0e8;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      }
      code { font-family: "Fira Code", "SFMono-Regular", Consolas, monospace; }
      .course-section {
        margin: 18px 0;
        padding: 18px 20px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(255, 251, 246, 0.82);
        box-shadow: 0 12px 28px rgba(73, 43, 22, 0.08);
      }
      .course-section-header {
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(92, 58, 32, 0.12);
      }
      .course-section-header h1,
      .course-section-header h2,
      .course-section-header h3 {
        margin: 0;
      }
      .course-section-body > :first-child {
        margin-top: 0;
      }
      .course-section-body > :last-child {
        margin-bottom: 0;
      }
      .python-question-card {
        position: relative;
        padding: 10px 0 0;
        margin: 12px 0 0;
        border-top: 1px solid rgba(92, 58, 32, 0.12);
      }
      .question-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        width: 100%;
        margin: 0;
        padding: 8px 106px 8px 10px;
      }
      .question-toolbar-title {
        min-width: 0;
        font-size: 0.95rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .question-row-button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: inherit;
        font-family: inherit;
        text-align: left;
        cursor: pointer;
      }
      .question-row-button:hover,
      .question-row-button:focus-visible {
        background: rgba(182, 83, 47, 0.08);
        border-color: rgba(182, 83, 47, 0.16);
        color: var(--accent);
      }
      .question-action-link,
      .question-action-button {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        text-decoration: none;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(92, 58, 32, 0.12);
        font: inherit;
        font-size: 0.88rem;
        cursor: pointer;
      }
      .question-action-button {
        appearance: none;
      }
      .question-rebuild-button {
        position: absolute;
        right: 10px;
        top: 18px;
        appearance: none;
        border: 1px solid rgba(92, 58, 32, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--muted);
        font: inherit;
        font-size: 0.82rem;
        padding: 4px 9px;
        cursor: pointer;
      }
      .question-rebuild-button:hover,
      .question-rebuild-button:focus-visible {
        border-color: rgba(182, 83, 47, 0.22);
        background: rgba(182, 83, 47, 0.1);
        color: var(--accent);
      }
      .question-rebuild-button[disabled] {
        cursor: wait;
        opacity: 0.68;
      }
      .question-action-button.primary {
        background: rgba(182, 83, 47, 0.1);
        border-color: rgba(182, 83, 47, 0.18);
        color: var(--accent);
      }
      .preview-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(28, 20, 13, 0.42);
        backdrop-filter: blur(8px);
        z-index: 1000;
      }
      .preview-modal.is-open {
        display: flex;
      }
      .preview-modal-dialog {
        width: min(1200px, 100%);
        height: min(90vh, 920px);
        display: flex;
        flex-direction: column;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: var(--surface-strong);
        box-shadow: 0 24px 60px rgba(34, 24, 15, 0.28);
        overflow: hidden;
      }
      .preview-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 248, 241, 0.94);
      }
      .preview-modal-title {
        font-size: 1.05rem;
        font-weight: 700;
      }
      .preview-modal-body {
        flex: 1;
        min-height: 0;
        background: #fff;
      }
      .preview-modal-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      @media (max-width: 900px) {
        .question-toolbar {
          align-items: flex-start;
          flex-direction: column;
          padding-right: 96px;
        }
        .question-toolbar-actions {
          justify-content: flex-start;
        }
        .preview-modal {
          padding: 12px;
        }
        .preview-modal-dialog {
          height: min(94vh, 920px);
        }
        .preview-modal-header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      ${CONTENT_HTML}
    </main>
    <div class="preview-modal" id="preview-modal" aria-hidden="true">
      <div class="preview-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="preview-modal-title">
        <div class="preview-modal-header">
          <div class="preview-modal-title" id="preview-modal-title">H5P Vorschau</div>
          <div class="question-toolbar-actions">
            <button class="question-action-button" type="button" data-modal-action="close">Schließen</button>
          </div>
        </div>
        <div class="preview-modal-body">
          <iframe class="preview-modal-frame" id="preview-modal-frame" title="H5P Vorschau"></iframe>
        </div>
      </div>
    </div>
    <script>
      const modal = document.getElementById("preview-modal");
      const modalFrame = document.getElementById("preview-modal-frame");
      const modalTitle = document.getElementById("preview-modal-title");

      const closeModal = () => {
        if (!(modal instanceof HTMLElement) || !(modalFrame instanceof HTMLIFrameElement)) {
          return;
        }
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
      };

      const openModal = (frameSrc, frameTitle) => {
        if (!(modal instanceof HTMLElement) || !(modalFrame instanceof HTMLIFrameElement) || !(modalTitle instanceof HTMLElement)) {
          return;
        }
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
        modalTitle.textContent = frameTitle || "H5P Vorschau";
        if (modalFrame.src !== new URL(frameSrc, window.location.href).href) {
          modalFrame.src = frameSrc;
        }
      };

      const prewarmedPreviewUrls = new Set();
      const prewarmPreview = (trigger) => {
        const statusUrl = trigger.dataset.statusUrl;
        if (!statusUrl || prewarmedPreviewUrls.has(statusUrl)) {
          return;
        }
        prewarmedPreviewUrls.add(statusUrl);
        fetch(statusUrl, { cache: "no-store" }).catch(() => {});
      };

      const rebuildPreview = async (trigger) => {
        const rebuildUrl = trigger.dataset.rebuildUrl;
        if (!rebuildUrl) {
          return;
        }
        const previousLabel = trigger.textContent;
        trigger.disabled = true;
        trigger.textContent = "Baue...";
        try {
          const response = await fetch(rebuildUrl, { method: "POST", cache: "no-store" });
          if (!response.ok) {
            throw new Error(await response.text());
          }
          if (trigger.dataset.statusUrl) {
            prewarmedPreviewUrls.delete(trigger.dataset.statusUrl);
            prewarmPreview(trigger);
          }
          if (modal instanceof HTMLElement && modal.classList.contains("is-open") && modalFrame instanceof HTMLIFrameElement && trigger.dataset.frameSrc) {
            const separator = trigger.dataset.frameSrc.includes("?") ? "&" : "?";
            modalFrame.src = `${trigger.dataset.frameSrc}${separator}rebuild=${Date.now()}`;
          }
          trigger.textContent = "Fertig";
          window.setTimeout(() => {
            trigger.textContent = previousLabel || "Neu bauen";
          }, 1200);
        } catch (error) {
          console.error(error);
          trigger.textContent = "Fehler";
          window.setTimeout(() => {
            trigger.textContent = previousLabel || "Neu bauen";
          }, 1800);
        } finally {
          trigger.disabled = false;
        }
      };

      document.querySelectorAll("[data-status-url]").forEach((element) => {
        if (element instanceof HTMLElement) {
          window.setTimeout(() => prewarmPreview(element), 0);
        }
      });

      document.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal();
          return;
        }

        const target = event.target instanceof HTMLElement
          ? event.target.closest("[data-open-modal], [data-modal-action], [data-rebuild-url]")
          : null;
        if (!(target instanceof HTMLElement)) {
          return;
        }

        if (target.dataset.rebuildUrl) {
          event.preventDefault();
          event.stopPropagation();
          rebuildPreview(target);
          return;
        }

        if (target.dataset.openModal === "true" && target.dataset.frameSrc) {
          prewarmPreview(target);
          openModal(target.dataset.frameSrc, target.dataset.frameTitle || target.textContent || "H5P Vorschau");
          return;
        }

        if (target.dataset.modalAction === "close" || target === modal) {
          closeModal();
          return;
        }

      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeModal();
        }
      });
    </script>
  </body>
</html>
