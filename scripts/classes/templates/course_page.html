<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>${TITLE} Vorschau</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe8;
        --surface: rgba(255, 250, 244, 0.9);
        --surface-strong: #fffdf9;
        --ink: #1c140d;
        --muted: #725b47;
        --accent: #b6532f;
        --accent-soft: #f1d7c5;
        --border: rgba(92, 58, 32, 0.18);
        --shadow: 0 20px 45px rgba(73, 43, 22, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(182, 83, 47, 0.12), transparent 26%),
          linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
      }
      main {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 96px;
      }
      h1, h2, h3 {
        line-height: 1.1;
        letter-spacing: -0.03em;
      }
      p, li {
        font-size: 1.05rem;
        line-height: 1.65;
      }
      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 16px;
        background: #22180f;
        color: #f7f0e8;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      }
      code { font-family: "Fira Code", "SFMono-Regular", Consolas, monospace; }
      .course-section {
        margin: 18px 0;
        padding: 18px 20px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(255, 251, 246, 0.82);
        box-shadow: 0 12px 28px rgba(73, 43, 22, 0.08);
      }
      .course-section-header {
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(92, 58, 32, 0.12);
      }
      .course-section-header h1,
      .course-section-header h2,
      .course-section-header h3 {
        margin: 0;
      }
      .course-section-body > :first-child {
        margin-top: 0;
      }
      .course-section-body > :last-child {
        margin-bottom: 0;
      }
      .python-question-card {
        position: relative;
        padding: 10px 0 0;
        margin: 12px 0 0;
        border-top: 1px solid rgba(92, 58, 32, 0.12);
      }
      .question-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        width: 100%;
        margin: 0;
        padding: 8px 10px;
      }
      .question-toolbar-title {
        min-width: 0;
        font-size: 0.95rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .question-action-link {
        display: inline-flex;
        align-items: center;
        flex: 0 0 auto;
        padding: 5px 10px;
        border-radius: 999px;
        text-decoration: none;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(92, 58, 32, 0.12);
        font: inherit;
        font-size: 0.88rem;
      }
      .question-action-link.primary {
        background: rgba(182, 83, 47, 0.1);
        border-color: rgba(182, 83, 47, 0.18);
        color: var(--accent);
      }
      @media (max-width: 900px) {
        .question-toolbar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      ${CONTENT_HTML}
    </main>
  </body>
</html>
