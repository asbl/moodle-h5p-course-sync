  showEditor: false
  text: |-
    `Der Code gibt alle Länder zurück, die mit einem beliebigen Buchstaben beginnen und deren zweiter Buchstabe ein n ist.

    `
- type: code
  showEditor: false
  code: |-
    `SELECT name FROM world
     WHERE name LIKE '_n%'
    `
