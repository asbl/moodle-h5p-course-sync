contentType: ide_only
editorSettings:
  mainClassName: Main
  instructions: |-
    `Nutze den Blockly-Editor, um ein Java-Programm zu schreiben,
    das die Summe der Zahlen 1 bis 10 berechnet und ausgibt.`
  startingCode: |-
    `public class Main {
        public static void main(String[] args) {
            int summe = 0;
            // Ergänze die Schleife
            System.out.println(summe);
        }
    }`
  editorMode: blocks
  options:
    editorMode: blocks
gradingSettings:
  gradingMethod: bySolution
  solution: |-
    `public class Main {
        public static void main(String[] args) {
            int summe = 0;
            for (int i = 1; i <= 10; i++) {
                summe += i;
            }
            System.out.println(summe);
        }
    }`
