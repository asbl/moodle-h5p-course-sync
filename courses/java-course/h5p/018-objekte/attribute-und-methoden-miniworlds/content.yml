contents:
- type: text
  text: |-
    `Bei der Programm hast du Attribute wie `pensize` gelesen und gesetzt und
    Methoden wie `forward()` aufgerufen. In Java OOP gilt dasselbe Prinzip.

    ### Attribute in Java OOP

    Java OOP-Objekte haben Attribute für Position, Größe und Farbe:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((225, 238, 252))

            // kreis = Java OOP.Circle((200, 150), 40)

            // Attribute lesen:
            System.out.println(kreis.x)        # x-Position);
            System.out.println(kreis.y)        # y-Position);
            System.out.println(kreis.size)     # Größe (Durchmesser);

            // Attribute setzen:
            kreis.color = (255, 130, 50)
            kreis.size = 80
            kreis.x = 100

            world.run()
        }
    }
    `
- type: text
  text: |-
    `Jede Zuweisung `objekt.attribut = wert` verändert nur dieses eine Objekt.

    ### Methoden in Java OOP

    Java OOP-Objekte haben Methoden zum Bewegen und Verändern:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((225, 238, 252))

            // figur = Java OOP.Actor((100, 150))
            figur.color = (60, 130, 220)
            figur.size = (40, 40)

            figur.move_right(100)   # Methode: 100 Pixel nach rechts
            figur.move_down(50)     # Methode: 50 Pixel nach unten

            world.run()
        }
    }
    `
- type: text
  text: |-
    `### Noch ein Beispiel

    Hier nochmal ein Beispiel mit mehreren Objekten, welche aus unterschiedlichen Klassen instanziiert werden:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((225, 238, 252))

            // kreis = Java OOP.Circle((80, 150), 30)
            kreis.color = (80, 160, 255)

            // rechteck = Java OOP.Rectangle((230, 120), 100, 60)
            rechteck.color = (255, 130, 50)

            // text = Java OOP.Text((50, 250), "")
            text.font_size = 18
            text.color = (20, 30, 55)
            text.text = f"Kreis bei x={kreis.x}, Rechteck bei x={rechteck.x}"

            world.run()
        }
    }
    `
- type: text
  text: Der Text-Actor liest Attribute von anderen Objekten und zeigt sie an.
