contentType: text_only
advancedOptions:
  disableOutputPopups: true
contents:
- type: text
  text: |-
    `Bei der Programm brauchtest du keine Argumente: `turtle.Programm()` erstellt
    einfach eine Programm an der Standardposition. In Java OOP legen
    Argumente beim Erzeugen den Anfangszustand fest.

    ### Argumente beim Instanziieren`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((225, 238, 252))

            // kreis = Java OOP.Circle((200, 150), 40)

            world.run()
        }
    }
    `
- type: text
  text: 'Hier werden zwei Klassen instanziiert:'
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // Java OOP.World(460, 300)
                            ───  ───
                            B    H     ← Breite und Höhe der Welt

            // Java OOP.Circle((200, 150), 40)
                               ─────────  ──
                               Position  Radius
        }
    }
    `
  options:
    showEditor: false
- type: text
  text: |-
    `Die Argumente in den Klammern legen fest, wie die Instanz am Anfang aussehen
    soll. Das ist dasselbe Prinzip wie bei Funktionen: Die Werte in den Klammern
    werden übergeben.

    ### Mehrere Instanzen

    Du kannst beliebig viele Instanzen derselben Klasse erzeugen. Jede bekommt
    ihre eigene Position:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((228, 238, 252))

            // k1 = Java OOP.Circle((80,  150), 30)
            // k2 = Java OOP.Circle((200, 150), 30)
            // k3 = Java OOP.Circle((320, 150), 30)

            world.run()
        }
    }
    `
- type: text
  text: |-
    `Drei Kreise – drei Instanzen der Klasse `Circle`. Jede wurde unabhängig
    mit ihrer eigenen Startposition erzeugt.

    !!! note Klasse und Instanz
    Die Klasse `Circle` ist die Vorlage. `k1`, `k2`, `k3` sind konkrete Instanzen.
    Das Erzeugen einer Instanz – `Java OOP.Circle(...)` – nennt man
    **Instanziierung**.
    !!!

    ### Verschiedene Java OOP-Klassen

    Java OOP stellt mehrere Klassen bereit, die du instanziieren kannst:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((228, 238, 252))

            // Kreis: runde Form; Argumente: Mittelpunkt, Radius
            // kreis = Java OOP.Circle((60, 75), 35)

            // Ellipse: ovale Form; Argumente: Position (oben-links), Breite, Höhe
            // ellipse = Java OOP.Ellipse((115, 50), 80, 50)

            // Rechteck: rechteckige Form; Argumente: Position (oben-links), Breite, Höhe
            // rechteck = Java OOP.Rectangle((220, 50), 90, 55)

            // Dreieck: drei Eckpunkte als Koordinaten-Tupel
            // dreieck = Java OOP.Triangle((360, 100), (330, 40), (395, 40))

            // Linie: Anfangs- und Endpunkt
            // linie = Java OOP.Line((25, 165), (435, 165))

            // Actor: Spielfigur ohne eigenes Bild (zeigt Standardaussehen)
            // figur = Java OOP.Actor((120, 225))
            figur.size = (50, 50)

            // Text: Textanzeige auf der Welt
            // text = Java OOP.Text((220, 225), "Hallo!")
            text.font_size = 22
            text.color = (20, 30, 55)

            // Number: Zahlenanzeige
            // punkte = Java OOP.Number((370, 215), 42)
            punkte.font_size = 28

            world.run()
        }
    }
    `
- type: text
  text: |-
    `Jede Klasse erwartet andere Argumente – aber alle folgen demselben Muster:
    Klassenname, Klammern, Argumente.`
