        public static void main(String[] args) {
            // import turtle

            // t1 = turtle.Turtle()

            // t2 = turtle.Turtle()
        }
    }
    `
gradingSettings:
  targetCode: |-
    `public class Main {
        public static void main(String[] args) {
            // import turtle

            // t1 = turtle.Turtle()
            t1.color("navy")
            t1.pensize = 3
            t1.penup()
            t1.goto(-30, 80)
            t1.pendown()
            t1.right(90)
            t1.forward(120)

            // t2 = turtle.Turtle()
            t2.color("navy")
            t2.pensize = 3
            t2.penup()
            t2.goto(-30, -40)
            t2.pendown()
            t2.forward(80)
        }
    }
    `
  gradingMethod: byOutputMatch
