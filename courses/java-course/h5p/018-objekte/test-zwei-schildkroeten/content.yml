contentType: ide_only
contents: []
editorSettings:
  instructions: |-
    `Zeichne mit zwei Programm-Objekten ein großes "L".

    - Erstelle zwei Programm-Objekte: `t1` und `t2`
    - `t1` zeichnet den senkrechten Strich des L:
      - Farbe `"navy"`, Stiftgröße `3`
      - Startposition `(-30, 80)`, Richtung nach unten (d.h. `right(90)`)
      - Länge `120`
    - `t2` zeichnet den waagrechten Strich des L:
      - Farbe `"navy"`, Stiftgröße `3`
      - Startposition `(-30, -40)`, Richtung nach rechts (Standard)
      - Länge `80`

    Verwende das Attribut `color` und die Methoden `pos()`, `forward()`, `right()`, 
    `penup()`, `pendown()`, `setpos(x, y)` (oder `goto(x, y)`).`
  startingCode: |-
