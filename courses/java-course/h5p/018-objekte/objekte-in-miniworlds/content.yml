contentType: text_only
advancedOptions:
  disableOutputPopups: true
contents:
- type: text
  text: |-
    `Jetzt wendest du alle Konzepte an: Objekte erzeugen, Attribute setzen,
    Methoden aufrufen und `self` in Ereignisfunktionen nutzen.

    ### Eine Szene aufbauen

    In Java OOP ist die Welt selbst ein Objekt. Alles, was du darin platzierst,
    ist ebenfalls ein Objekt:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((220, 232, 248))

            // sonne = Java OOP.Circle((390, 60), 38)
            sonne.color = (255, 215, 50)

            // boden = Java OOP.Rectangle((0, 255), 460, 45)
            boden.color = (100, 175, 100)

            // turm = Java OOP.Rectangle((180, 150), 100, 105)
            turm.color = (160, 115, 80)

            // tor = Java OOP.Rectangle((210, 210), 40, 45)
            tor.color = (80, 60, 45)

            world.run()
        }
    }
    `
- type: text
  text: |-
    `Jedes Element – Sonne, Boden, Turm, Tor – ist eine eigene Instanz einer
    Klasse. Jede hat ihre eigene Position, Farbe und Größe.

    ### Objekte mit Tasteneingaben steuern

    Wenn eine Figur auf Tasten reagieren soll, verwendest du `@figur.register`
    mit `self`:`
- type: code
  code: |-
    `public class Main {
        public static void on_key_down_right(int self) {
        self.x = self.x + 15

        // @figur.register
        public static void on_key_down_left(int self) {
        self.x = self.x - 15

        // @figur.register
        public static void on_key_down_up(int self) {
        self.y = self.y - 15

        // @figur.register
        public static void on_key_down_down(int self) {
        self.y = self.y + 15

        world.run()
        }
        }

        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((225, 238, 250))

            // figur = Java OOP.Actor((80, 150))
            figur.color = (60, 130, 220)
            figur.size = (38, 38)

            // ziel = Java OOP.Circle((380, 150), 22)
            ziel.color = (255, 180, 40)

            // @figur.register
    `
- type: text
  text: |-
    ``self.x` und `self.y` sind Attribute des `figur`-Objekts. Im Handler greifst
    du über `self` darauf zu und änderst sie – das Objekt bewegt sich.

    ### Zustand anzeigen

    Mit einem Text-Objekt kannst du den Zustand eines Objekts sichtbar machen:`
- type: code
  code: |-
    `public class Main {
        public static void on_key_down_right(int self) {
        self.x = self.x + 18
        anzeige.text = f"x={self.x}  y={self.y}"

        // @figur.register
        public static void on_key_down_left(int self) {
        self.x = self.x - 18
        anzeige.text = f"x={self.x}  y={self.y}"

        world.run()
        }
        }

        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(460, 300)
            world.add_background((225, 238, 252))

            // figur = Java OOP.Actor((230, 150))
            figur.color = (60, 130, 220)
            figur.size = (36, 36)

            // anzeige = Java OOP.Text((10, 10), "")
            anzeige.font_size = 18
            anzeige.color = (20, 30, 55)

            // @figur.register
    `
- type: text
  text: |-
    `### Aufgabe

    Erweitere das letzte Beispiel:

    - Füge Pfeil-oben und Pfeil-unten als weitere Handler hinzu
    - Ändere die Farbe der Figur, wenn `self.x` einen bestimmten Wert überschreitet
      (zum Beispiel rot, wenn die Figur den rechten Rand erreicht)
    - Füge ein zweites Objekt hinzu, das die Figur "verfolgt" – es bewegt sich
      immer ein kleines Stück in Richtung Figur`
