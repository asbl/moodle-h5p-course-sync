    `---

    ## Niveau 3

    ### Code-Review

    Beurteile den folgenden Code. Was funktioniert nicht wie erwartet? Erkläre
    das Problem und schreibe eine korrigierte Version.`
- type: code
  code: |-
    `public class Main {
        public static void alle_positiv(int liste) {
        ergebnis = False;
        for (var element : liste) {
        if (element > 0) {
        ergebnis = True;
        } else {
        ergebnis = False;
        return ergebnis;

        System.out.println(alle_positiv([1, 2, 3]))    # soll True sein);
        System.out.println(alle_positiv([-1, 2, 3]))   # soll False sein);
        }
        }

        public static void main(String[] args) {
    `
- type: text
  text: |-
    `Teste beide Aufrufe, erkläre dann: Wann gibt die Funktion ein falsches
    Ergebnis, und warum?`
