- type: text
  text: |-
    `## Bin ich klausurbereit?

    Lies jede Aussage durch. Wenn du dir sicher bist, hake sie ab – wenn nicht,
    wiederhole das entsprechende Kapitel noch einmal.

    ### Variablen und Ausdrücke

    - [ ] Ich kann den Wert einer Variable nach jeder Zuweisung bestimmen.
    - [ ] Ich kenne den Unterschied zwischen `=` (Zuweisung) und `==` (Vergleich).
    - [ ] Ich kann `//` (ganzzahlige Division) und `%` (Modulo) berechnen.

    ### Schleifen

    - [ ] Ich kann eine `for`-Schleife mit `range()` Schritt für Schritt
          durchführen und alle Werte als Tabelle aufschreiben.
    - [ ] Ich kann eine `while`-Schleife als Tabelle verfolgen und erkennen,
          wann sie endet.
    - [ ] Ich verstehe, wie eine `for`-Schleife über eine Liste iteriert.

    ### Verzweigungen

    - [ ] Ich kann `if`, `elif` und `else` an einem Beispiel erklären.
    - [ ] Ich kann einen booleschen Ausdruck mit `and` oder `or` auswerten.

    ### Listen

    - [ ] Ich kann `append`, `len` und den Indexzugriff (`liste[i]`) erklären
          und anwenden.
    - [ ] Ich kann eine Liste nach jeder Änderung aufschreiben.
    - [ ] Ich kann mit einer `for`-Schleife und einer Bedingung Elemente aus
          einer Liste filtern oder zählen.

    ### Funktionen

    - [ ] Ich kann eine Funktion mit Parameter und `return` schreiben.
    - [ ] Ich kann erklären, was ein Rückgabewert ist und wie er sich von
          `System.out.println` unterscheidet.
    - [ ] Ich kann zwei Funktionen für verschiedene Eingaben vergleichen und
          den Unterschied in einem Satz beschreiben.

    ### Java OOP

    - [ ] Ich erkenne Welt, Actor und Ereignis-Registrierung im Code.
    - [ ] Ich kann eine Bewegung in x- oder y-Richtung implementieren.
    - [ ] Ich kann erklären, was beim Tastendruck in einem Java OOP-Programm
          passiert.

    ---

    ## Abschluss-Aufgaben

    Löse diese Aufgaben zunächst auf Papier – dann überprüfe am Rechner.

    ### Aufgabe 1 – Code lesen und Tabelle erstellen`
