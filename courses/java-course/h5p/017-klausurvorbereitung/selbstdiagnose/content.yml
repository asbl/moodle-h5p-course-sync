    ## Niveau 2 – Anspruchsvollere Aufgaben

    ### Aufgabe 4 – while-Schleife analysieren`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            int n = 64;
            int schritte = 0;
            while (n > 1) {
                n = n // 2;
                schritte = schritte + 1;
            System.out.println(schritte);
        }
    }
    `
- type: text
  text: 'a) Fülle die Tabelle aus und bestimme die Ausgabe:'
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Schritt | n  | schritte | Bedingung n > 1
