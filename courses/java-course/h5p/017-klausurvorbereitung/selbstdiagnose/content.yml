    `### Aufgabe 7 – Entwurf beschreiben

    Beschreibe in Stichworten (kein fertiger Code), wie eine Funktion
    `rangfolge(punkte)` vorgehen würde: Sie erhält eine Liste von Punktzahlen
    und soll eine sortierte Liste von Tupeln `(rang, punkte)` zurückgeben,
    wobei Rang 1 die höchste Punktzahl bekommt.

    Welche Schritte braucht die Funktion? Welche Schwierigkeit siehst du?`
