    ## Niveau 2

    ### Übung 3

    Diesmal gibt es zwei Zählkategorien. Lege eine Tabelle mit den Spalten
    `p`, `p >= 6`, `p >= 4`, `hoch`, `mittel` an.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            punkte = [3, 7, 5, 2, 8, 4, 6];
            int hoch = 0;
            int mittel = 0;
            for (var p : punkte) {
                if (p >= 6) {
                    hoch = hoch + 1;
                } else if (p >= 4) {
                    mittel = mittel + 1;
            System.out.println(hoch, mittel);
        }
    }
    `
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            p | p >= 6 | p >= 4 | hoch | mittel
            3 | nein   | nein   | 0    | 0
