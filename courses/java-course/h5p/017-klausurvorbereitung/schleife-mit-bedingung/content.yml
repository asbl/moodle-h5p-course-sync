    `### Übung 2

    Welche Wörter landen in der Liste `kurze`? Bestimme die Ausgabe zuerst
    auf Papier.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            woerter = ["Hund", "Katze", "Aal", "Esel", "Uhu"];
            kurze = [];
            for (var wort : woerter) {
                if (len(wort) <= 3) {
                    kurze.append(wort)
            System.out.println(kurze);
        }
    }
    `
