- type: text
  text: |-
    `Wenn eine `for`-Schleife eine Bedingung enthält, prüfst du für jedes Element,
    ob die Bedingung gilt – und notierst, was sich ändert.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            zahlen = [3, 7, 2, 8, 1];
            int summe = 0;
            for (var z : zahlen) {
                if (z > 4) {
                    summe = summe + z;
            System.out.println(summe)  # nur 7 und 8 zählen: 15);
        }
    }
    `
  options:
    showEditor: false
- type: text
  text: |-
    `### Übung 1

    Bestimme die Ausgabe. Schreibe eine Tabelle mit den Spalten
    `w`, `w % 2 == 0`, `summe`.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            werte = [4, 9, 1, 6, 3, 8];
            int summe = 0;
            for (var w : werte) {
                if (w % 2 == 0) {
                    summe = summe + w;
            System.out.println(summe);
        }
    }
    `
