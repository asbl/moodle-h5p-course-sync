    ## Niveau 2

    ### Übung 3

    Verfolge die Variablen. Die Ausdrücke bauen aufeinander auf.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            int x = 3;
            y = x * x;
            x = y - x;
            y = x + y;
            System.out.println(x, y);
        }
    }
    `
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Zuweisung | x | y
            x = 3     | 3 | –;
            y = x * x | 3 | ?;
            x = y - x | ? | ?;
            y = x + y | ? | ?;
            Ausgabe:  | ? | ?
        }
    }
    `
  options:
    showEditor: false
- type: text
  text: |-
    `### Übung 4

    Auch Zeichenketten haben eine Länge. Was gibt das Programm aus?`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            String wort = "Info";
            laenge = len(wort);
            wort = wort + "rmatik";
            System.out.println(laenge, len(wort));
        }
    }
    `
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Zuweisung              | wort         | laenge
            wort = "Info"          | "Info"       | –;
            laenge = len(wort)     | "Info"       | 4;
            wort = wort + "rmatik" | ?            | ?;
            Ausgabe:               | (len = ?)    | ?
        }
    }
    `
  options:
    showEditor: false
- type: text
  text: |-
    `---

    ## Niveau 3

    ### Übung 5 – Rückwärts denken

    Das Programm soll `8 5` ausgeben. Welchen Anfangswert muss `a` haben?
    Begründe schriftlich, bevor du es ausprobierst.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            int b = 3;
            a = 0  # Suche den richtigen Anfangswert;
            a = a + b;
            b = a - b;
            System.out.println(a, b)  # soll: 8 5);
        }
    }
    `
- type: text
  text: |-
    `### Übung 6 – Behauptung beurteilen

    Ein Schüler behauptet: „Nach dem Code haben `x` und `y` denselben Wert."
    Hat er Recht? Erkläre Schritt für Schritt, warum oder warum nicht.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            int x = 5;
            y = x;
            x = x + 1;
            System.out.println(x == y);
        }
    }
    `
