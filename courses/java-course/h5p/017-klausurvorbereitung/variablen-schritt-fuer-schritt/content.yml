contentType: text_only
contents:
- type: text
  text: |-
    `Vor der Klausur: Übe, Variablen Schritt für Schritt mitzuverfolgen. Nach
    jeder Zeile solltest du wissen, welchen Wert jede Variable hat.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            x = 5       # x = 5;
            y = x + 2   # y = 7;
            x = y - 1   # x = 6;
            System.out.println(x, y) # Ausgabe: 6 7);
        }
    }
    `
  options:
    showEditor: false
- type: text
  text: |-
    `Schreibe dir die Werte nach jeder Zeile als kleine Tabelle auf.

    ### Übung 1

    Bestimme ohne Ausführen die Ausgabe. Notiere die Werte von `a`, `b` und `c`
    nach jeder Zuweisung.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            int a = 10;
            int b = 4;
            c = a - b;
            a = c + 1;
            b = a * 2;
            System.out.println(a, b, c);
        }
    }
    `
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Zuweisung   | a  | b | c
            a = 10      | 10 | – | –;
            b = 4       | 10 | 4 | –;
            c = a - b   | ?  | ? | ?;
            a = c + 1   | ?  | ? | ?;
            b = a * 2   | ?  | ? | ?;
            Ausgabe:    | ?  | ? | ?
        }
    }
    `
  options:
    showEditor: false
- type: text
  text: '### Übung 2'
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            int punkte = 20;
            int bonus = 5;
            punkte = punkte + bonus;
            bonus = punkte // 4;
            System.out.println(punkte, bonus);
        }
    }
    `
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Zuweisung              | punkte | bonus
            punkte = 20            | 20     | –;
            bonus = 5              | 20     | 5;
            punkte = punkte + bonus | ?     | ?;
            bonus = punkte // 4    | ?      | ?;
            Ausgabe:               | ?      | ?
        }
    }
    `
