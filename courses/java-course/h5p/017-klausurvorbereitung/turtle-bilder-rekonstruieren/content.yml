    * Alle Quadrate haben denselben Mittelpunkt (0, 0).
    * Seitenlänge: 100.

    Schreibe zuerst auf Papier, welche Befehle du brauchst (goto, left/right,
    penup/pendown, forward), dann implementiere.`
