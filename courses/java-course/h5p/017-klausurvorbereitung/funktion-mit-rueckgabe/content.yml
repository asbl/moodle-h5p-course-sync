- type: text
  text: |-
    `Jede Funktion kann einen Wert zurückgeben. Überlege zuerst: Was soll die
    Funktion **berechnen oder prüfen**? Dann wähle die passende Rechnung oder
    Bedingung.`
- type: code
  code: |-
    `public class Main {
        public static void verdoppeln(int zahl) {
        return zahl * 2;

        System.out.println(verdoppeln(5))   # 10);
        System.out.println(verdoppeln(3))   # 6);
        }

        public static void main(String[] args) {
    }
    `
- type: text
  text: |-
    `### Übung 1

