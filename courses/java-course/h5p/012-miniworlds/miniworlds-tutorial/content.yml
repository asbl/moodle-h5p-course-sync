    `self.x`` in jedem Frame um 1 erhöht 
    - der Actor bewegt sich Pixel für Pixel nach rechts.`
- type: code
  code: |-
    `public class Main {
        public static void act(int self) {
        self.x = self.x + 1  # jeden Frame 1 Pixel nach rechts

        world.run()
        }

        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(400, 300)
            world.add_background((100, 180, 100))

            // actor = Java OOP.Actor((20, 150))
            actor.add_costume("images/char.png")

            // @actor.register
