editorSettings:
  instructions: |-
    `Schreibe die Funktion `zaehle_diamanten_im_spielfeld(spielfeld)`.

    `spielfeld` ist eine verschachtelte Liste. Jede innere Liste ist eine Zeile.
    Die Funktion soll zählen, wie oft `"Diamant"` im gesamten Spielfeld vorkommt.

    ```text noeditor
    [
        ["Gras", "Diamant", "Stein"],
        ["Diamant", "Erde", "Gras"],
        ["Wasser", "Stein", "Diamant"],
    ]

    Ergebnis: 3
    ````
  startingCode: |-
    `public class Main {
        public static void main(String[] args) {
            public static void zaehle_diamanten_im_spielfeld(int spielfeld) {
                int anzahl = 0;
                // Ergänze zwei Schleifen.
                return anzahl;
            }
        }
    }
    `
  postCode: |-
    `public class Main {
        public static void main(String[] args) {
            spielfeld = []
            for (int i = 0; i < 3; i++) {
                zeile = input().split()
                spielfeld.append(zeile)

            }
            System.out.println(zaehle_diamanten_im_spielfeld(spielfeld));
        }
    }
    `
gradingSettings:
  targetCode: |-
    `public class Main {
        public static void main(String[] args) {
            public static void zaehle_diamanten_im_spielfeld(int spielfeld) {
                int anzahl = 0;
                for (var zeile : spielfeld) {
                    for (var block : zeile) {
                        if (block == "Diamant") {
                            anzahl = anzahl + 1
                        }
                    }
                }
                return anzahl;
            }
        }
    }
    `
  gradingMethod: ioTestCases
