contentType: ide_only
contents: []
editorSettings:
  instructions: |-
    `In einer Liste stehen die Blöcke, die beim Graben gefunden wurden.

    Ergänze die Funktion `zaehle_diamanten(bloecke)`. Sie soll für jede übergebene
    Liste zurückgeben, wie oft `"Diamant"` darin vorkommt.

    | Block | Aktion |
    | --- | --- |
    | `"Stein"` | nicht zählen |
    | `"Diamant"` | `anzahl` um `1` erhöhen |
    | `"Erde"` | nicht zählen |
    | `"Diamant"` | `anzahl` um `1` erhöhen |

    Die Testfälle stehen unter der Aufgabe. Jeder Testfall übergibt eine eigene
    Blockliste.`
  startingCode: |-
    `public class Main {
        public static void main(String[] args) {
            public static void zaehle_diamanten(int bloecke) {
                int anzahl = 0;
                // Ergänze die Schleife.
                return anzahl;
            }
        }
    }
    `
  postCode: |-
    `public class Main {
        public static void main(String[] args) {
            bloecke = input().split()
            System.out.println(zaehle_diamanten(bloecke));
        }
    }
    `
gradingSettings:
  targetCode: |-
    `public class Main {
        public static void main(String[] args) {
            public static void zaehle_diamanten(int bloecke) {
                int anzahl = 0;
                for (var block : bloecke) {
                    if (block == "Diamant") {
                        anzahl = anzahl + 1
                    }
                }
                return anzahl;
            }
        }
    }
    `
  gradingMethod: ioTestCases
  testCases:
  - hidden: false
    inputs:
    - Stein Diamant Erde Diamant
    outputs:
    - '2'
  - hidden: false
    inputs:
    - Diamant Diamant Gold
    outputs:
    - '2'
  - hidden: false
    inputs:
    - Erde Stein Kohle
    outputs:
    - '0'
  - hidden: true
    inputs:
    - ''
    outputs:
    - '0'
