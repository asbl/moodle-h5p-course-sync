- type: text
  text: |-
    `Eine besonders wichtige Operation ist das Tauschen des Inhalts zweier Variablen. 

    Das Problem dabei ist: An einem Speicherplatz steht immer genau **ein Wert.*
    Wenn dieser Wert überschrieben wird, dann ist er unwiderruflich verloren.

    Betrachte folgenden Code und überlege dir, warum er nicht geeignet ist, 
    um den Wert zweier Variablen zu tauschen.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            int a = 3;
            int b = 4;
            b = a;
            a = b;
        }
    }
    `
- type: text
  text: |-
    `In den meisten Programmiersprachen benötigst du daher eine dritte Variable
    als Hilfsvariable, um die beiden Werte zu tauschen.

    Dies ist deine nächste Aufgabe:`
