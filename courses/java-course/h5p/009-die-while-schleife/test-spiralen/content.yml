gradingSettings:
  targetCode: |-
    `public class Main {
        public static void main(String[] args) {
            // import turtle

            x = int(input())

            // t = turtle.Turtle()
            t.speed(0)

            int length = 25;
            while (length <= x) {
                t.forward(length)
                t.right(90)
                length += 5

            }
            // turtle.done()
        }
    }
    `
