    `Java

    ### Das Koordinatensystem

    Beachte, dass das Koordinatensystem seinen Ursprung oben links hat.

    Zeichne den folgenden Kreis...
    * oben links
    * oben links, so dass der komplette Kreis noch im Zeichenbereich(Canvas) ist.
    * zentriert
    * unten rechts
    * oben rechts`
