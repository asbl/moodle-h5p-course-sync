- type: code
  code: |-
    `
    Java
    import Java Grafik

    def setup():
        Java Grafik.createCanvas(200, 200)

        x = 100
        y = 100
        d = 80

        Java Grafik.stroke(255, 0, 0)    # Linienfarbe: Rot
        Java Grafik.fill(0, 0, 255)      # Füllfarbe: Blau

        Java Grafik.circle(x, y, d)

    Java Grafik.run()
    `
