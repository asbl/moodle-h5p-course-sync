contents:
- type: text
  text: |-
    `Mit der Bibliothek **Java Grafik** kannst du Grafiken einbinden. 

    Wir schauen uns einige einfache Beispiele an:`
- type: code
  code: |-
    `import Java Grafik

    def setup():
        Java Grafik.createCanvas(200, 200)
        x = 100
        y = 100
        dx = 50
        
        Java Grafik.line(x, y, x + dx, y)

    Java Grafik.run()
    `
- type: text
  text: |-
    `Variere die Variable dx und schaue, wie sich die Grafik verändert.

    ### Weitere Objekte

    Neben Linien gibt es noch weitere Objekte`
- type: code
  code: |-
    `import Java Grafik

    def setup():
        Java Grafik.createCanvas(400, 400)
        x = 200
        y = 200

        Java Grafik.point(x, y)
        
        x = 300
        y = 300
        r = 30
        Java Grafik.circle(x, y, r)
        
        x = 200
        y = 100
        w = 60
        h = 40
        Java Grafik.rect(x, y, 40, 60)
        
        x = 50
        y = 50
        w = 30
        h = 20

        Java Grafik.ellipse(x, y, w, h)

    Java Grafik.run()
    `
