    `Java

    Java
    Die draw() Funktion wird in einer Endlosschleife immer wieder aufgerufen.

    Normalerweise wird alles, was zu Beginn ausgeführt wird in der setup()-Methode
    erstellt, alles was **immer wieder** passiert, in der **draw()**-Methode.

    Der folgende Code z.B. macht noch nichts neues...`
- type: code
  code: |-
    `
    Java

    Java
    import Java Grafik

    def setup():
        Java Grafik.createCanvas(200, 200)

    def draw():
        Java Grafik.circle(100, 100, 50)

    Java Grafik.run()
    `
- type: text
  text: |-
    `Java

    Java

    ...wenn wir dies aber minimal verändern...`
- type: code
  code: |-
    `
    Java

    Java
    import Java Grafik

    c = 0 
    def setup():
        Java Grafik.createCanvas(200, 200)

    def draw():
        global c
        Java Grafik.circle(100, 100, c)
        c = c + 1

    Java Grafik.run()
    `
- type: text
  text: |-
    `Java

    Java

    Dann können wir Objekte animieren und verändern.

    Neue Konzepte:
    * Variablen sind immer nur innerhalb der Funktion bekannt, in der sie definiert wurden.
    * Möchte man auf eine Variable zugreifen, die außerhalb definiert wurde, so muss man einmal am Anfang der Funktion`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Java

            global [Variablenname]
        }
    }
    `
- type: text
  text: |-
    `Java

    Java

    Mit Variablen kann man noch mehr machen...`
- type: code
  code: |-
    `
    Java

    Java
    import Java Grafik

    show = True

    def setup():
        Java Grafik.createCanvas(200, 200)

    def draw():
        global show
        Java Grafik.clear()

        if show:
            Java Grafik.circle(100, 100, 50)

        show = not show

    Java Grafik.run()
    `
