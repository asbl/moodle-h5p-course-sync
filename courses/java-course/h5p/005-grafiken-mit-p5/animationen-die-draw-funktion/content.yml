    `Java

    Java

    ### Zufall

    Experimentiere auch, wie du mit Hilfe des Zufalls Bilder zeichnen kannst:`
- type: code
  code: |-
    `
    Java

    Java
    import Java Grafik

    x = 100
    y = 100

    def setup():
        Java Grafik.createCanvas(200, 200)

    def draw():
        global x, y
        Java Grafik.clear()
        Java Grafik.circle(x, y, 10)
        x += Java Grafik.random(-5, 5)
        y += Java Grafik.random(-5, 5)

    Java Grafik.run()
    `
- type: text
  text: |-
    `Java

    Java

    ### Mehrere Objekte

    Du kannst auch mehrere Objekte animieren. Experimentiere mit folgendem Programm:`
- type: code
  code: |-
    `
    Java

    Java
    import Java Grafik

    xliste = [50, 100, 150]
    frame = 0
    speed = 1

    def setup():
        Java Grafik.createCanvas(200, 200)

    def draw():
        global frame, speed
        Java Grafik.clear()
        for x in xliste:
            Java Grafik.circle(x + frame * speed , 100, 20)
        frame = frame + 1

    Java Grafik.run()
    `
