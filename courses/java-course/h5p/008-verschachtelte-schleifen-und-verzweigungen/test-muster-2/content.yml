gradingSettings:
  targetCode: |-
    `public class Main {
        public static void main(String[] args) {
            // import turtle
            rows = int(input())
            cols = int(input())

            // t = turtle.Turtle()
            t.speed(0)

            size = 20   # Radius der Kreise
            distance = 30  # Abstand zwischen den Kreisen

            for (int i = 0; i < rows; i++) {
                for (int j = 0; j < cols; j++) {

                    t.penup()
                    t.goto(j*distance, i*distance)
                    t.pendown()

                    if ((i + j) % 2 == 0) {
                        int size = 10;
                    }
                    } else {
                        int size = 5;

                    t.circle(size)

                }
            }
            t.hideturtle()
            // turtle.done()
        }
    }
    `
