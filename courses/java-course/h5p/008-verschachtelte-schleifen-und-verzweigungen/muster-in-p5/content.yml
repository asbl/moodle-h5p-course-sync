contentType: text_only
contents:
- type: text
  text: 'Auch in Java Grafik kannst du Muster erstellen:'
- type: code
  code: |-
    `import Java Grafik

    def setup():
        Java Grafik.createCanvas(200, 200)
        Java Grafik.noLoop()  # Zeichnet nur einmal

    def draw():
        size = 8  # 8x8 Schachbrett
        square_size = Java Grafik.width / size  # Größe jedes Quadrats
        
        for row in range(size):
            for col in range(size):
                if (row + col) % 2 == 0:
                    Java Grafik.fill(255)  # weiß
                else:
                    Java Grafik.fill(0)    # schwarz
                Java Grafik.rect(col * square_size, row * square_size, square_size, square_size)

    Java Grafik.run()
    `
- type: text
  text: |-
    `Mit Benutzereingaben, kannst du eine Figur sich auf dem Muster bewegen lassen.
    (Evtl musst du einmal ins Spielfeld klicken, damit Eingaben registriert werden)`
- type: code
  code: |-
    `import Java Grafik

    # Spielfigur-Koordinaten (startet oben links)
    player_x = 0
    player_y = 0
    size = 8  # Schachbrettgröße
    square_size = 50  # Pixelgröße pro Quadrat (200 / 8 = 25)

    def setup():
        global square_size
        Java Grafik.createCanvas(400, 400)
        Java Grafik.noLoop()  # Zeichen nur bei Update
        square_size = Java Grafik.width / size

    def draw():
        global player_x, player_y
        Java Grafik.background(200)  # neutraler Hintergrund
        
        # Schachbrett zeichnen
        for row in range(size):
            for col in range(size):
                if (row + col) % 2 == 0:
                    Java Grafik.fill(255)  # weiß
                else:
                    Java Grafik.fill(0)    # schwarz
                Java Grafik.rect(col * square_size, row * square_size, square_size, square_size)
        
        # Spielfigur zeichnen (Kreis)
        Java Grafik.fill(255, 0, 0)  # rot
        Java Grafik.ellipse(player_x * square_size + square_size / 2,
                   player_y * square_size + square_size / 2,
                   square_size * 0.8, square_size * 0.8)

    def keyPressed():
        global player_x, player_y
        
        if Java Grafik.key == "w" and player_y > 0:
            player_y -= 1 # gleichbedeutend mit player_y = player_y - 1
        elif Java Grafik.key == "s" and player_y < size - 1:
            player_y += 1
        elif Java Grafik.key == "a" and player_x > 0:
            player_x -= 1
        elif Java Grafik.key == "d" and player_x < size - 1:
            player_x += 1
        
        Java Grafik.redraw()  # Aktualisiert die Zeichenfläche

    Java Grafik.run()
    `
- type: text
  text: '...und wenn du noch eine Kollisionserkennung einfügst, dann bist du schon
    nah an einem eigenen Spiel:'
- type: code
  code: |-
    `import Java Grafik

    # Spielfigur-Koordinaten (startet oben links)
    player_x = 0
    player_y = 0
    size = 8  # Schachbrettgröße
    square_size = 50  # Pixelgröße pro Quadrat (200 / 8 = 25)
    coin_collected = False

    def setup():
        global square_size
        Java Grafik.createCanvas(400, 400)
        Java Grafik.noLoop()  # Zeichen nur bei Update
        square_size = Java Grafik.width / size

    def draw():
        global player_x, player_y, coin_collected
        Java Grafik.background(200)  # neutraler Hintergrund
        
        # Schachbrett zeichnen
        for row in range(size):
            for col in range(size):
                if (row + col) % 2 == 0:
                    Java Grafik.fill(255)  # weiß
                else:
                    Java Grafik.fill(0)    # schwarz
                Java Grafik.rect(col * square_size, row * square_size, square_size, square_size)
        
        # Spielfigur zeichnen (Kreis)
        Java Grafik.fill(255, 0, 0)  # rot
        Java Grafik.ellipse(player_x * square_size + square_size / 2,
                   player_y * square_size + square_size / 2,
                   square_size * 0.8, square_size * 0.8)
        if not coin_collected:
                Java Grafik.fill(255, 255, 0)  
                Java Grafik.ellipse(3 * square_size + square_size / 2,
                   2 * square_size + square_size / 2,
                   square_size * 0.8, square_size * 0.8)
            

    def keyPressed():
        global player_x, player_y, coin_collected
        
        if Java Grafik.key == "w" and player_y > 0:
            player_y -= 1
        elif Java Grafik.key == "s" and player_y < size - 1:
            player_y += 1
        elif Java Grafik.key == "a" and player_x > 0:
            player_x -= 1
        elif Java Grafik.key == "d" and player_x < size - 1:
            player_x += 1
        
        if player_x == 3 and player_y ==2:
            coin_collected = True
        Java Grafik.redraw()  # Aktualisiert die Zeichenfläche

    Java Grafik.run()
    `
