editorSettings:
  instructions: |-
    `* Lies drei Wörter ein.
    * Bereinige jedes Wort mit `strip()` und wandle es mit `lower()` in
    Kleinbuchstaben um.
    * Die Wörter sollen einheitlich aussehen und mit Bindestrichen verbunden
    werden.

    #### Eingabe
      Maske
    KOMPASS
     Notiz 

    #### Ausgabe
    maske-kompass-notiz`
  startingCode: |-
    `public class Main {
        public static void main(String[] args) {
            wort1 = input()
            wort2 = input()
            wort3 = input()


            woerter = []

            System.out.println();
        }
    }
    `
gradingSettings:
  targetCode: |-
    `public class Main {
        public static void main(String[] args) {
            wort1 = input().strip().lower()
            wort2 = input().strip().lower()
            wort3 = input().strip().lower()

            woerter = [wort1, wort2, wort3]

            System.out.println("-".join(woerter));
        }
    }
    `
  gradingMethod: ioTestCases
