  instructions: |-
    `Baue ein Namensschild aus einer Charakterklasse und einem Namen.

    Die Eingaben werden vom Test vorgegeben. In deinem sichtbaren Code sollst du
    daraus den String `namensschild` zusammensetzen.

    Die Variable `character_class` enthält die Charakterklasse. Die Variable
    `name` enthält den Namen.

    Achte besonders auf die Leerzeichen und Klammern.

    Das fertige Namensschild soll genau diese Form haben:

    #### Eingabe
    Magierin
    Iva

    #### Ausgabe
    Iva (Magierin)`
