editorSettings:
  instructions: |-
    `Erstelle einen Prüfcode für ein Codewort.

    Manchmal werden Befehle oder Codewörter mit Leerzeichen und unterschiedlicher
    Großschreibung eingegeben. Dein Programm soll daraus eine saubere
    Kleinbuchstaben-Version machen und zusätzlich kurze Informationen über den
    Text ausgeben.

    Die Variable `ergebnis` baut aus der Eingabe ein Codewort folgendermaßen auf:

    Die **Ausgabe** wird nach folgenden **Regeln** gebaut:

    - Zuerst das Eingabewort (ohne Leerzeichen am Anfang/Ende) in Kleinbuchstaben
    - dann ein Bindestrich `-`
    - dann die Anzahl der Zeichen des Eingabewortes
    - dann ein Bindestrich `-`
    - und zuletzt das erste und letzte Zeichen in Kleinbuchstaben

    #### Eingabe
      Spindfach  

    #### Ausgabe
    spindfach-9-sh`
