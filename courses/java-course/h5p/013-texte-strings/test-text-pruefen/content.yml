gradingSettings:
  targetCode: |-
    `public class Main {
        public static void main(String[] args) {
            text = input()
            text = text.strip()
            klein = text.lower()

            ergebnis = f"{klein}-{len(text)}-{klein[0]}{klein[-1]}"
            System.out.println(ergebnis);
        }
    }
    `
