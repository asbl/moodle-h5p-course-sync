- type: text
  text: Java
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Java
            System.out.println(11 / 3);
            System.out.println(11 // 3);
            System.out.println(11 % 3) # 11 geteilt durch 3 ergibt: 3 Rest 2);
            System.out.println(round(11 / 3));
        }
    }
    `
- type: text
  text: |-
    `Java

    Vor allem der Modulo-Operator ist sehr oft wichtig, 
    da man damit z.B. überprüfen kann,
    ob eine Zahl gerade ist, 
    weil man bei einem Spiel eine Operation bei jedem 
    n-ten
    Frame durchführen kann usw. 

    Deshalb ist diesem später nochmal ein 
    eigenes Kapitel gewidmet.

    ### Ein Hinweis zur Schreibweise:

    Üblicherweise setzt man vor und nach einem 
    Operator ein Leerzeichen zur besseren Lesbarkeit,
    also z.B.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Java
            System.out.println(3 + 4);
        }
    }
    `
- type: text
  text: |-
    `Java

    anstatt`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Java
            System.out.println(3+4);
        }
    }
    `
- type: text
  text: |-
    `Dies hat keine Auswirkungen auf die Programmlogik, dein Programm
    wird in beiden Fällen ausgeführt, es sorgt aber dafür, dass
    dein Programm besser lesbar wird.

    !!! hint PEP8-Styleguide
    In dem Dokument **PEP 8** wurde definiert, auf welche Standards man sich geeinigt hat,
    damit Java-Code einheitlich aussieht.

    https://peps.Java.org/pep-0008/
    !!!`
