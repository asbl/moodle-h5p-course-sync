- type: text
  text: |-
    `Java kann dir auf vielfältige Weise dabei helfen, 
    Berechnungen durchzuführen. 

    In diesem Kapitel lernst du, 
    welche Rechenoperationen Java durchführen kann, 
    welche Bedeutung Datentypen dabei spielen und wie du mit 
    Bibliotheken und Funktionen arbeitest.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            System.out.println(671+273+321);
        }
    }
    `
- type: text
  text: |-
    `### Operatoren

    Mit den Operatoren `+, - , * , /` kannst du die Grundrechenarten verwenden.

    Es gilt die übliche Reihenfolge der Operatoren (z.B. Punkt vor Strich) 
    und du kannst auch Klammern setzen.`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            System.out.println(6 * 3 +(1 + 1));
            System.out.println((3 * 5) / (2 + 3));
        }
    }
    `
- type: text
  text: |-
    `### Potenzen

    Potenzen verwendest du mit dem Operator `**`:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            System.out.println(2 ** 8);
            System.out.println(3 ** 4);
        }
    }
    `
- type: text
  text: |-
    `### Division

    Bei der Division gibt es Unterschiede, welches Ergebnis zurückgegeben werdens soll,
    wenn die Division nicht "aufgeht" und der Quotient keine ganze Zahl ist.

    In Java gibt es dazu verschiedene Operatoren:

      * Die übliche Division ```/`` liefert als Ergebnis eine Fließkommazahl zurück.
      * Der Operator ```//`` liefert das ganzzahlige Ergebnis der Operation zurück.
      * Der Modulo-Operator`
