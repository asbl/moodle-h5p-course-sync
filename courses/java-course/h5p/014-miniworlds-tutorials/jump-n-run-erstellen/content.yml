contents:
- type: text
  text: |-
    `# Ein Jump'n'Run erstellen

    Ein Jump'n'Run besteht aus drei Grundideen:

    * Der Spieler kann nach links und rechts laufen.
    * Die Schwerkraft zieht ihn nach unten.
    * Er darf nur springen, wenn er auf dem Boden steht.

    Wir bauen das Schritt für Schritt in einer normalen `World`.

    ### Spieler und Boden`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(640, 360)
            world.add_background((185, 220, 245))

            // spieler = Java OOP.Actor((90, 250))
            spieler.size = (30, 40)
            spieler.color = (60, 120, 220)

            // boden = Java OOP.Rectangle.from_topleft((0, 320), 640, 40)
            boden.color = (90, 150, 105)

            world.run()
        }
    }
    `
- type: text
  text: |-
    `### Plattformen als Liste

    Für Kollisionen ist es praktisch, alle Plattformen in einer Liste zu speichern.`
- type: code
  code: |-
    `public class Main {
        public static void neue_plattform(int x, int y, int breite, int hoehe) {
        // plattform = Java OOP.Rectangle.from_topleft((x, y), breite, hoehe)
        plattform.color = (90, 150, 105)
        plattformen.append(plattform)

        neue_plattform(0, 320, 640, 40)
        neue_plattform(220, 250, 120, 18)
        neue_plattform(420, 195, 120, 18)

        world.run()
        }

        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(640, 360)
            world.add_background((185, 220, 245))

            // spieler = Java OOP.Actor((90, 250))
            spieler.size = (30, 40)
            spieler.color = (60, 120, 220)

            plattformen = [];

    }
    `
- type: text
  text: |-
    `### Kollisionen mit detect

    Java OOP kann Actors erkennen. Mit `self.detect(...)` prüfst du, ob ein Actor
    einen anderen Actor berührt:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            if (self.detect(plattform)) {
                System.out.println("Plattform berührt");
        }
    }
    `
- type: text
  text: |-
    `Das nutzen wir gleich für den Boden und die Plattformen.

    ### Fallen und landen

    Wir speichern die vertikale Geschwindigkeit in `spieler.vy`. Positive Werte
    bewegen den Spieler nach unten, negative Werte nach oben.`
- type: code
  code: |-
    `public class Main {
        public static void neue_plattform(int x, int y, int breite, int hoehe) {
        // plattform = Java OOP.Rectangle.from_topleft((x, y), breite, hoehe)
        plattform.color = (90, 150, 105)
        plattformen.append(plattform)

        neue_plattform(0, 320, 640, 40)
        neue_plattform(220, 250, 120, 18)
        neue_plattform(420, 195, 120, 18)

        // @spieler.register
        public static void act(int self) {
        self.vy = self.vy + 1
        self.y = self.y + self.vy
        self.am_boden = False

        for (var plattform : plattformen) {
        if (self.detect(plattform) and self.vy >= 0) {
        self.y = plattform.y - self.height
        self.vy = 0
        self.am_boden = True

        world.run()
        }
        }

        public static void main(String[] args) {
            // import Java OOP

            // world = Java OOP.World(640, 360)
            world.add_background((185, 220, 245))

            // spieler = Java OOP.Actor((90, 250))
            spieler.size = (30, 40)
            spieler.color = (60, 120, 220)
            spieler.vy = 0
            spieler.am_boden = False

            plattformen = [];

    `
- type: text
  text: |-
    `Der Spieler fällt nach unten. Sobald er eine Plattform von oben berührt, wird er
    auf die Plattform gesetzt.

    ### Laufen und springen

    Jetzt kommen die Tasten dazu. Beim Sprung setzen wir `vy` auf einen negativen
    Wert. Das geht nur, wenn `am_boden` wahr ist.`
