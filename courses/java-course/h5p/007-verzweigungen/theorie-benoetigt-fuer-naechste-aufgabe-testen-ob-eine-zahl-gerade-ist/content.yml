- type: text
  text: |-
    `Java
    kann man damit sehr gut überprüfen, ob eine Zahl durch
    2 teilbar ist.

    #### Beispiel:`
- type: code
  code: |-
    `public class Main {
        public static void main(String[] args) {
            Java
            x = int(input());
            if (x % 2 == 0) {
                System.out.println("Die Zahl ist gerade!");
            if (x % 2 != 0) {
                System.out.println("Die Zahl ist nicht gerade");
        }
    }
    `
